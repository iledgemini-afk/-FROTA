<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ILED · Console de Frota & Carga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
:root{
  --bg:#08090b; --bg2:#0c0e12; --panel:rgba(255,255,255,.035); --panel2:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.16);
  --txt:#eef1f5; --txt2:#aab1bd; --txt3:#727a86;
  --red:#e11d2a; --amber:#f5a623; --green:#25c281; --blue:#3b82f6; --yellow:#f5c518;
  --glow:0 0 18px rgba(255,255,255,.28);
  --r:16px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 78% -10%, rgba(59,130,246,.10), transparent 60%),
    radial-gradient(900px 500px at 10% 0%, rgba(225,29,42,.10), transparent 55%),
    var(--bg);
  color:var(--txt); font-family:"Inter",system-ui,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
.spectrum{height:3px;width:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--red) 0%,var(--red) 22%,var(--yellow) 40%,#fff 60%,var(--blue) 82%,var(--blue) 100%);
  box-shadow:0 0 14px rgba(255,255,255,.25);}
.wrap{max-width:1400px;margin:0 auto;padding:0 20px 60px}

/* HEADER */
header.top{position:sticky;top:0;z-index:40;
  background:linear-gradient(180deg,rgba(8,9,11,.96),rgba(8,9,11,.82));
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);}
.hbar{max-width:1400px;margin:0 auto;padding:14px 20px 12px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px;min-width:0}
.brand img{height:44px;width:auto;filter:drop-shadow(0 0 10px rgba(255,255,255,.18))}
.brand .bt{display:flex;flex-direction:column;line-height:1}
.brand .bt b{font-family:"Archivo";font-weight:800;font-size:14px;letter-spacing:.14em;color:#fff}
.brand .bt span{font-size:10.5px;letter-spacing:.30em;color:var(--txt3);margin-top:4px;text-transform:uppercase}
.hspace{flex:1 1 auto}
.alerts{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:999px;border:1px solid var(--line);
  background:var(--panel);font-size:12px;font-weight:600;color:var(--txt2)}
.pill b{font-family:"JetBrains Mono";color:var(--txt);font-size:13px}
.pill .dot{width:8px;height:8px;border-radius:50%}
.pill.a .dot{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.pill.r .dot{background:var(--red);box-shadow:0 0 8px var(--red)}
.pill.g .dot{background:var(--green);box-shadow:0 0 8px var(--green)}
.btn{cursor:pointer;border:1px solid var(--line2);background:var(--panel2);color:var(--txt);
  padding:8px 13px;border-radius:10px;font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:7px;
  transition:.15s;font-family:inherit}
.btn:hover{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.28)}
.btn:active{transform:translateY(1px)}
.upd{font-size:11px;color:var(--txt3);font-family:"JetBrains Mono"}

/* MODULE TABS */
nav.modtabs{max-width:1400px;margin:0 auto;padding:0 20px;display:flex;gap:6px;flex-wrap:wrap}
.modtab{cursor:pointer;border:none;background:transparent;color:var(--txt3);
  padding:12px 18px 14px;font-family:"Archivo";font-weight:700;font-size:14px;letter-spacing:.05em;
  border-bottom:3px solid transparent;transition:.15s;display:flex;align-items:center;gap:9px}
.modtab:hover{color:var(--txt2)}
.modtab.on{color:#fff;border-bottom-color:var(--red)}
.modtab .ic{font-size:16px}

/* SUB NAV */
.subnav{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0 4px}
.subtab{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--txt2);
  padding:9px 15px;border-radius:11px;font-weight:600;font-size:13px;transition:.15s;
  display:flex;align-items:center;gap:8px;font-family:inherit}
.subtab:hover{border-color:var(--line2);color:var(--txt)}
.subtab.on{background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.05));
  color:#fff;border-color:rgba(255,255,255,.32);box-shadow:0 4px 20px rgba(0,0,0,.35)}
.subtab .cnt{font-family:"JetBrains Mono";font-size:11px;color:var(--txt3);
  background:rgba(0,0,0,.3);padding:1px 7px;border-radius:8px}
.subtab.on .cnt{color:var(--txt2)}

/* VIEW HEAD */
.vhead{display:flex;align-items:flex-end;gap:16px;margin:26px 0 8px;flex-wrap:wrap}
.vhead h1{font-family:"Archivo";font-weight:800;font-size:26px;margin:0;letter-spacing:.01em}
.vhead .sub{color:var(--txt3);font-size:13px;margin-bottom:3px}
.vhline{margin:12px 0 22px}
.tools{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap}
.search{position:relative}
.search input{background:var(--panel);border:1px solid var(--line);color:var(--txt);
  padding:9px 13px 9px 34px;border-radius:11px;font-size:13px;width:230px;font-family:inherit;outline:none}
.search input:focus{border-color:var(--line2)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.5}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--txt3))}
.kpi .lab{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);font-weight:600}
.kpi .val{font-family:"JetBrains Mono";font-weight:700;font-size:27px;margin-top:8px;letter-spacing:-.02em}
.kpi .foot{font-size:11.5px;color:var(--txt3);margin-top:4px}

/* CARDS / TABLE */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.tblwrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:13px}
thead th{position:sticky;top:0;background:#101318;color:var(--txt2);text-align:left;
  font-weight:600;font-size:11px;letter-spacing:.05em;text-transform:uppercase;
  padding:12px 14px;border-bottom:1px solid var(--line2);white-space:nowrap;z-index:2}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line);color:var(--txt);vertical-align:middle;white-space:nowrap}
tbody tr:hover{background:rgba(255,255,255,.028)}
tbody tr:last-child td{border-bottom:none}
.mono{font-family:"JetBrains Mono";font-size:12.5px}
.strong{font-weight:700}
.muted{color:var(--txt3)}
.tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;
  font-size:11.5px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.tag .d{width:7px;height:7px;border-radius:50%}
.t-g{background:rgba(37,194,129,.14);color:#5fe0af;border:1px solid rgba(37,194,129,.3)}
.t-a{background:rgba(245,166,35,.14);color:#ffca6b;border:1px solid rgba(245,166,35,.32)}
.t-r{background:rgba(225,29,42,.16);color:#ff8a92;border:1px solid rgba(225,29,42,.34)}
.t-n{background:rgba(255,255,255,.06);color:var(--txt2);border:1px solid var(--line)}
.t-b{background:rgba(59,130,246,.14);color:#8fb8ff;border:1px solid rgba(59,130,246,.32)}

/* ROMANEIO */
.rm-head{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.rm-meta{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.rm-meta .l{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);font-weight:600}
.rm-meta .v{font-family:"Archivo";font-weight:800;font-size:22px;margin-top:6px}
.rm-line{display:flex;gap:12px;align-items:stretch;padding:14px 16px;border-bottom:1px solid var(--line)}
.rm-line:last-child{border-bottom:none}
.rm-idx{font-family:"JetBrains Mono";font-weight:700;font-size:15px;color:var(--txt3);min-width:64px;
  display:flex;flex-direction:column;gap:5px;align-items:flex-start}
.rm-idx .n{color:#fff}
.rm-cols{flex:1;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.rm-col{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;
  padding:7px 11px;font-size:12.5px;display:flex;flex-direction:column;gap:2px;min-width:60px}
.rm-col .cn{font-size:9.5px;letter-spacing:.06em;color:var(--txt3);text-transform:uppercase}
.rm-col .cq b{font-family:"JetBrains Mono";color:var(--yellow);font-size:15px}
.rm-col .cq{font-size:11.5px;color:var(--txt2);line-height:1.25}
.rm-metrics{display:flex;gap:16px;align-items:center;padding-left:6px;border-left:1px solid var(--line)}
.rm-metrics .m{text-align:right}
.rm-metrics .m .mv{font-family:"JetBrains Mono";font-weight:700;font-size:13px}
.rm-metrics .m .ml{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em}
.truckbar{background:#000;color:#fff;text-align:center;padding:9px;font-family:"Archivo";font-weight:800;
  letter-spacing:.1em;font-size:12px;border-radius:10px;margin:10px 0}
.rm-summary{background:linear-gradient(180deg,rgba(225,29,42,.12),rgba(225,29,42,.04));
  border:1px solid rgba(225,29,42,.3);border-radius:var(--r);padding:16px 18px;margin-top:16px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.rm-summary .big{font-family:"Archivo";font-weight:800;font-size:18px}

/* heatmap cell */
td.hm{text-align:center;font-family:"JetBrains Mono";font-weight:700;font-size:13px}

/* OVERVIEW: section titles */
.sec-title{display:flex;align-items:center;gap:10px;margin:26px 0 14px;font-family:"Archivo";font-weight:700;
  font-size:15px;letter-spacing:.06em;text-transform:uppercase;color:var(--txt2)}
.sec-title .bar{height:16px;width:4px;border-radius:4px;background:var(--red);box-shadow:0 0 10px var(--red)}
.sec-title.blue .bar{background:var(--blue);box-shadow:0 0 10px var(--blue)}

/* alert windows */
.alertgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}
.awin{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column}
.awin .ah{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line)}
.awin .ah .ic{font-size:17px}
.awin .ah .ttl{font-weight:700;font-size:13.5px;flex:1}
.awin .ah .badge{font-family:"JetBrains Mono";font-weight:700;font-size:12px;padding:2px 10px;border-radius:999px}
.awin.crit .ah{background:rgba(225,29,42,.08)} .awin.crit .badge{background:rgba(225,29,42,.18);color:#ff8a92}
.awin.warn .ah{background:rgba(245,166,35,.07)} .awin.warn .badge{background:rgba(245,166,35,.16);color:#ffca6b}
.awin.okk  .badge{background:rgba(37,194,129,.16);color:#5fe0af}
.awin .alist{max-height:262px;overflow-y:auto}
.arow{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line)}
.arow:last-child{border-bottom:none}
.arow .main{flex:1;min-width:0}
.arow .main .p{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arow .main .s{font-size:11.5px;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arow .r{text-align:right;flex-shrink:0}
.arow .r .mv{font-family:"JetBrains Mono";font-weight:700;font-size:13px}
.awin .allok{padding:26px 16px;text-align:center;color:#5fe0af;font-size:13px;font-weight:600}
.awin .allok span{display:block;font-size:26px;margin-bottom:6px}

/* chart windows */
.chartgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(460px,1fr));gap:14px}
.cwin{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px 12px}
.cwin .ch{display:flex;align-items:baseline;gap:9px;margin-bottom:6px}
.cwin .ch .ct{font-weight:700;font-size:13.5px}
.cwin .ch .cs{font-size:11px;color:var(--txt3)}
.cwin .canvasbox{position:relative;height:250px;margin-top:8px}
@media(max-width:520px){ .chartgrid{grid-template-columns:1fr} .cwin .canvasbox{height:220px} }

/* states */
.state{padding:60px 20px;text-align:center;color:var(--txt3)}
.spin{width:34px;height:34px;border:3px solid var(--line2);border-top-color:#fff;border-radius:50%;
  margin:0 auto 16px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err{color:#ff8a92}
.hide{display:none!important}
.foot-note{text-align:center;color:var(--txt3);font-size:11.5px;margin-top:30px;line-height:1.6}
.foot-note b{color:var(--txt2)}
@media(max-width:640px){
  .rm-head{grid-template-columns:1fr}
  .search input{width:150px}
  .vhead h1{font-size:21px}
}
</style>
</head>
<body>

<header class="top">
  <div class="hbar">
    <div class="brand">
      <img id="logo" alt="ILED Produções">
      <div class="bt"><b>ILED PRODUÇÕES</b><span>Console · Frota &amp; Carga</span></div>
    </div>
    <div class="hspace"></div>
    <div class="alerts" id="alertStrip"></div>
    <button class="btn" id="refreshBtn" title="Atualizar dados">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
      Atualizar
    </button>
    <span class="upd" id="updStamp">—</span>
  </div>
  <nav class="modtabs" id="modTabs"></nav>
  <div class="spectrum"></div>
</header>

<div class="wrap">
  <div class="subnav" id="subNav"></div>
  <div id="viewArea"></div>
  <div class="foot-note">
    Dados lidos ao vivo das planilhas publicadas do Google Sheets · atualização automática a cada 5 min.<br>
    Motor de cálculo do romaneio permanece no <b>Apps Script V38.0</b> · este console é a camada de consulta.
  </div>
</div>

<script>
/* ================= CONFIG ================= */
var FROTA_BASE="https://docs.google.com/spreadsheets/d/e/2PACX-1vT_CZKASfXZX2qsAeHjrLHOnF1gPmisUMDDHcdppOse1RoMoJBirGd91lhzp8_el3xoHN-ShAVS-AS7/pub?single=true&output=csv&gid=";
var CARGA_BASE="https://docs.google.com/spreadsheets/d/e/2PACX-1vTVb4iuz_WXpWnQ320SH9T4cn3GbJrrWHnjnj3TLULnXUHUP-X_h1_oZivLRqJVGA-pRB-d4Za8TxdS/pub?single=true&output=csv&gid=";

var VIEWS={
  motorista:{url:FROTA_BASE+"1340873248", tokens:["NOME","CNH","VALIDADE"]},
  veiculo:  {url:FROTA_BASE+"0",          tokens:["PLACA","RENAVAN"]},
  multa:    {url:FROTA_BASE+"523318325",  tokens:["DATA","INFRA","VALOR"]},
  troca:    {url:FROTA_BASE+"1378949365", tokens:["PLACA","ITEM CONTROLE"]},
  simulacao:{url:CARGA_BASE+"0",          tokens:[]},
  paineis:  {url:CARGA_BASE+"1236085488", tokens:["PAINEL","LARGURA","ALTURA"]},
  cveiculos:{url:CARGA_BASE+"1802141395", tokens:["VE","LARGURA","COMPRIMENTO"]},
  resultado:{url:CARGA_BASE+"958113099",  tokens:[]},
  capacidade:{url:CARGA_BASE+"1375904468",tokens:["PAINEL"]}
};

var MODULES=[
  {id:"painel", label:"VISÃO GERAL", ic:"📈", views:[
    {id:"overview", label:"Painel", ic:"📈"}
  ]},
  {id:"frota", label:"FROTA", ic:"🚚", views:[
    {id:"veiculo",  label:"Veículos",  ic:"🚚"},
    {id:"motorista",label:"Motoristas",ic:"👷"},
    {id:"multa",    label:"Multas",    ic:"🧾"},
    {id:"troca",    label:"Trocas",    ic:"🔃"}
  ]},
  {id:"carga", label:"CARGA", ic:"📦", views:[
    {id:"resultado", label:"Romaneio",   ic:"🗺️"},
    {id:"simulacao", label:"Simulação",  ic:"📝"},
    {id:"capacidade",label:"Capacidade", ic:"📊"},
    {id:"paineis",   label:"Painéis",    ic:"📐"},
    {id:"cveiculos", label:"Veículos",   ic:"🚛"}
  ]}
];

/* ================= STATE ================= */
var cache={};          /* viewId -> {rows,headers,raw} */
var counts={};         /* viewId -> row count */
var state={mod:"painel", view:"overview", filter:""};
var timer=null;
var OV_CHARTS=[];      /* active Chart.js instances on the overview */

/* ================= HELPERS ================= */
function $(id){return document.getElementById(id);}
function el(t,c,h){var e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;}
function norm(s){return String(s==null?"":s).replace(/\s+/g," ").trim().toUpperCase();}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function cleanNum(s){ /* strips trailing .0 from ID-like text */
  var v=String(s==null?"":s).trim();
  if(/^\d+\.0$/.test(v)) return v.slice(0,-2);
  return v;
}
function toNumber(s){
  var v=String(s==null?"":s).trim().replace(/[^\d,.\-]/g,"");
  if(!v) return NaN;
  if(v.indexOf(",")>-1 && v.indexOf(".")>-1){ v=v.replace(/\./g,"").replace(",","."); }
  else if(v.indexOf(",")>-1){ v=v.replace(",","."); }
  var n=parseFloat(v); return isNaN(n)?NaN:n;
}
function fmtInt(n){ if(isNaN(n))return"—"; return n.toLocaleString("pt-BR"); }
function fmtMoney(n){ if(isNaN(n))return"—"; return "R$ "+n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }

var MON=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
function parseDate(s){
  var v=String(s==null?"":s).trim();
  if(!v) return null;
  var m;
  m=v.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(m){ var y=+m[3]; if(y<100)y+=2000; return new Date(y,+m[2]-1,+m[1]); }
  if(/^\d{4,6}$/.test(v)){ var serial=+v; if(serial>30000&&serial<60000){ var d=new Date(Date.UTC(1899,11,30)); d.setUTCDate(d.getUTCDate()+serial); return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()); } }
  var d2=new Date(v); return isNaN(d2.getTime())?null:d2;
}
function fmtDate(d){ if(!d)return"—"; return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear(); }
function daysUntil(d){ if(!d)return null; var t=new Date(); t.setHours(0,0,0,0); return Math.round((d-t)/86400000); }

/* status tag from days-to-expire */
function expTag(days){
  if(days==null) return '<span class="tag t-n">—</span>';
  if(days<0)   return '<span class="tag t-r"><span class="d" style="background:var(--red)"></span>VENCIDO '+(-days)+'d</span>';
  if(days<=30) return '<span class="tag t-a"><span class="d" style="background:var(--amber)"></span>'+days+'d</span>';
  if(days<=60) return '<span class="tag t-a"><span class="d" style="background:var(--amber)"></span>'+days+'d</span>';
  return '<span class="tag t-g"><span class="d" style="background:var(--green)"></span>'+days+'d</span>';
}

/* ================= CSV LOADER ================= */
function fetchView(id){
  var cfg=VIEWS[id];
  return fetch(cfg.url+"&_="+Date.now()).then(function(r){ if(!r.ok)throw new Error("HTTP "+r.status); return r.text(); })
    .then(function(txt){
      var parsed=Papa.parse(txt,{skipEmptyLines:false});
      var rows=parsed.data;
      cache[id]={raw:rows};
      if(cfg.tokens.length){
        var mapped=mapByHeader(rows,cfg.tokens);
        cache[id].headers=mapped.headers; cache[id].rows=mapped.rows;
        counts[id]=mapped.rows.length;
      }else{
        cache[id].headers=[]; cache[id].rows=[];
      }
      return cache[id];
    });
}
function mapByHeader(rows,tokens){
  var T=tokens.map(norm), hi=-1;
  for(var i=0;i<rows.length;i++){
    var cells=rows[i].map(norm), ok=true;
    for(var t=0;t<T.length;t++){
      var found=false;
      for(var c=0;c<cells.length;c++){ if(cells[c]===T[t]||cells[c].indexOf(T[t])>-1){found=true;break;} }
      if(!found){ok=false;break;}
    }
    if(ok){hi=i;break;}
  }
  if(hi<0) return {headers:[],rows:[]};
  var hdr=rows[hi].map(function(x){return String(x==null?"":x).trim();});
  var out=[];
  for(var r=hi+1;r<rows.length;r++){
    var obj={}, any=false;
    for(var k=0;k<hdr.length;k++){
      var key=norm(hdr[k]); if(!key)continue;
      var val=String(rows[r][k]==null?"":rows[r][k]).trim();
      obj[key]=val; if(val)any=true;
    }
    if(any) out.push(obj);
  }
  return {headers:hdr,rows:out};
}
function g(o,k){ return o[norm(k)]!=null?o[norm(k)]:""; }

/* ================= ALERT STRIP ================= */
function computeAlerts(){
  var vencMot=0, vencVei=0, trocaAt=0, multaCob=0;
  var mot=cache.motorista&&cache.motorista.rows||[];
  for(var i=0;i<mot.length;i++){ var d=daysUntil(parseDate(g(mot[i],"VALIDADE"))); if(d!=null&&d<=60)vencMot++; }
  var vei=cache.veiculo&&cache.veiculo.rows||[];
  for(var j=0;j<vei.length;j++){ var dv=daysUntil(parseDate(g(vei[j],"VENC. TACÓGRAFO"))); if(dv!=null&&dv<=60)vencVei++; }
  var tro=cache.troca&&cache.troca.rows||[];
  for(var k=0;k<tro.length;k++){ var st=trocaStatus(tro[k]); if(st.cls!=="g")trocaAt++; }
  var mul=cache.multa&&cache.multa.rows||[];
  for(var m=0;m<mul.length;m++){ if(norm(g(mul[m],"À COBRAR"))==="SIM")multaCob++; }
  var s=$("alertStrip"); s.innerHTML="";
  function pill(cls,label,val){ var p=el("div","pill "+cls); p.innerHTML='<span class="dot"></span>'+label+' <b>'+val+'</b>'; s.appendChild(p); }
  pill(vencMot?"a":"g","CNH vence",vencMot);
  pill(vencVei?"a":"g","Tacógrafo",vencVei);
  pill(trocaAt?"a":"g","Trocas",trocaAt);
  pill(multaCob?"r":"g","Multas a cobrar",multaCob);
}

/* ================= TROCA status ================= */
function trocaStatus(o){
  var ind=norm(g(o,"INDICADOR"));
  var falt=toNumber(g(o,"KM FALTANTE"));
  if(ind.indexOf("VENC")>-1||(!isNaN(falt)&&falt<=0)) return {cls:"r",txt:"VENCIDO"};
  if(ind.indexOf("ATEN")>-1||ind.indexOf("PROX")>-1||ind.indexOf("PRÓX")>-1||(!isNaN(falt)&&falt<1500)) return {cls:"a",txt:"ATENÇÃO"};
  if(ind) return {cls:ind.indexOf("DIA")>-1?"g":"n",txt:ind};
  return {cls:"g",txt:"EM DIA"};
}

function matchFilter(vals){
  if(!state.filter) return true;
  var q=state.filter.toLowerCase();
  return vals.join(" ").toLowerCase().indexOf(q)>-1;
}

/* ================= RENDER: CAPACIDADE (heatmap) ================= */
function renderCapacidade(d){
  var raw=cache.capacidade.raw;
  var m=mapByHeader(raw,["PAINEL"]);
  var hdr=m.headers, rows=m.rows;
  if(!hdr.length) return emptyState();
  var vehCols=[]; for(var i=1;i<hdr.length;i++){ if(String(hdr[i]).trim()) vehCols.push(hdr[i]); }
  var max=0,min=1e9;
  for(var r=0;r<rows.length;r++){ for(var c=0;c<vehCols.length;c++){ var n=toNumber(rows[r][norm(vehCols[c])]); if(!isNaN(n)){ if(n>max)max=n; if(n<min)min=n; } } }
  function hm(n){
    if(isNaN(n)) return '<td class="hm muted">—</td>';
    var t=max>min?(n-min)/(max-min):0.5;
    var bg="rgba("+Math.round(225-t*180)+","+Math.round(40+t*150)+","+Math.round(60+t*70)+","+(0.10+t*0.32).toFixed(2)+")";
    return '<td class="hm" style="background:'+bg+'">'+fmtInt(n)+'</td>';
  }
  var thead='<th style="min-width:260px">Painel \\ Veículo</th>';
  for(var v=0;v<vehCols.length;v++){ thead+='<th style="text-align:center">'+esc(vehCols[v])+'</th>'; }
  var body="";
  for(var rr=0;rr<rows.length;rr++){
    var nome=rows[rr][norm(hdr[0])]; if(!nome)continue;
    if(!matchFilter([nome])) continue;
    body+='<tr><td class="strong">'+esc(nome)+'</td>';
    for(var cc=0;cc<vehCols.length;cc++){ body+=hm(toNumber(rows[rr][norm(vehCols[cc])])); }
    body+='</tr>';
  }
  var h=kpi("var(--blue)","Painéis",fmtInt(rows.length),"linhas")
       +kpi("var(--red)","Veículos",fmtInt(vehCols.length),"colunas")
       +kpi("var(--amber)","Máx. cases/veículo",fmtInt(max),"pico da matriz");
  return '<div class="kpis">'+h+'</div>'
    +'<div class="muted" style="font-size:12px;margin-bottom:10px">Capacidade máxima teórica (cases) por combinação painel × veículo. Cor mais quente = maior aproveitamento.</div>'
    +'<div class="card"><div class="tblwrap"><table><thead><tr>'+thead+'</tr></thead><tbody>'+body+'</tbody></table></div></div>';
}

/* ================= RENDER: SIMULAÇÃO ================= */
function renderSimulacao(){
  var raw=cache.simulacao.raw;
  var evento="",veic="",fl="",fc="",fa="";
  var items=[], inTable=false;
  for(var i=0;i<raw.length;i++){
    var row=raw[i]; var joined=row.map(function(x){return String(x==null?"":x).trim();});
    var a=norm(joined[0]);
    function after(idx){ for(var k=idx+1;k<joined.length;k++){ if(joined[k]) return joined[k]; } return ""; }
    if(a.indexOf("NOME DO EVENTO")>-1) evento=after(0);
    else if(a.indexOf("VEÍCULO")>-1 && !inTable) veic=after(0);
    else if(a.indexOf("LARGURA")>-1) fl=after(0);
    else if(a.indexOf("COMPRIMENTO")>-1) fc=after(0);
    else if(a.indexOf("ALTURA")>-1) fa=after(0);
    else if(a.indexOf("DESCRIÇÃO PAINEL")>-1){ inTable=true; continue; }
    if(inTable){
      var sku=joined[0], qt="";
      for(var q=1;q<joined.length;q++){ if(joined[q]!==""){ qt=joined[q]; break; } }
      if(sku && norm(sku).indexOf("DESCRIÇÃO")<0){ items.push({sku:sku,qtd:qt}); }
    }
  }
  var totalCases=0, comQtd=0;
  for(var t=0;t<items.length;t++){ var n=toNumber(items[t].qtd); if(!isNaN(n)&&n>0){ totalCases+=n; comQtd++; } }
  var freteInfo=(fl||fc||fa)?(esc(fl||"?")+" × "+esc(fc||"?")+" × "+esc(fa||"?")+" m"):"—";
  var h=kpi("var(--red)","Evento",evento?esc(evento):'<span class="muted">—</span>',"em simulação")
       +kpi("var(--blue)","Veículo",veic?'<span style="font-size:16px">'+esc(veic)+'</span>':'<span class="muted">—</span>',"selecionado")
       +kpi("var(--amber)","Cases a carregar",fmtInt(totalCases),comQtd+" SKUs com quantidade")
       +kpi("var(--green)","Frete avulso",'<span style="font-size:15px">'+freteInfo+'</span>',"L × C × A");
  var body="";
  for(var r=0;r<items.length;r++){
    var it=items[r]; var n2=toNumber(it.qtd); var has=(!isNaN(n2)&&n2>0);
    if(!matchFilter([it.sku])) continue;
    body+='<tr'+(has?'':' style="opacity:.45"')+'>'
      +'<td class="'+(has?"strong":"")+'">'+esc(it.sku)+'</td>'
      +'<td class="mono strong" style="text-align:right">'+(has?fmtInt(n2):'<span class="muted">0</span>')+'</td>'
      +'</tr>';
  }
  if(!body) body='<tr><td colspan="2" class="muted" style="text-align:center;padding:30px">Simulação vazia. Preencha na planilha.</td></tr>';
  return '<div class="kpis">'+h+'</div>'
    +'<div class="muted" style="font-size:12px;margin-bottom:10px">Entrada atual do romaneio. Após rodar o Apps Script, o resultado aparece na aba <b>Romaneio</b>.</div>'
    +'<div class="card"><div class="tblwrap"><table><thead><tr><th>Descrição do painel</th><th style="text-align:right">Cases/Caixas</th></tr></thead><tbody>'+body+'</tbody></table></div></div>';
}

/* ================= RENDER: RESULTADO / ROMANEIO ================= */
function renderResultado(){
  var raw=cache.resultado.raw;
  var evento="",veic="",peso="",sobra="";
  var lines=[], inTable=false;
  for(var i=0;i<raw.length;i++){
    var row=raw[i]; var joined=row.map(function(x){return String(x==null?"":x).trim();});
    var first=joined[0], A=norm(first);
    function nextVal(){ for(var k=1;k<joined.length;k++){ if(joined[k])return joined[k]; } return ""; }
    if(A==="EVENTO:") evento=nextVal();
    else if(A==="VEÍCULO:"){ if(!inTable) veic=nextVal(); }
    else if(A.indexOf("ENDEREÇAMENTO")>-1){ inTable=true; continue; }
    else if(A.indexOf("RESUMO FINAL")>-1){ inTable=false; continue; }
    if(A.indexOf("PESO TOTAL")>-1){ var mp=first.match(/PESO TOTAL:\s*([\d.,]+)/i); if(mp)peso=mp[1]; var mv=first.match(/(.+?)\s*\|/); }
    if(A.indexOf("SOBRA DE LASTRO")>-1){ sobra=nextVal()||first.replace(/.*:/,"").trim(); }
    if(A.indexOf("FIM DO CAMINH")>-1){ lines.push({truck:first}); continue; }
    if(inTable && first.indexOf("LINHA")===0){
      lines.push(parseRomaneioLine(first, joined[1], joined[2], joined[3]));
    }
  }
  if(!lines.length && !evento) return emptyState();

  var nLinhas=0; for(var L=0;L<lines.length;L++){ if(lines[L].cols)nLinhas++; }
  var h=kpi("var(--red)","Evento",evento?esc(evento):"—","romaneio ativo")
       +kpi("var(--blue)","Veículo",'<span style="font-size:15px">'+(veic?esc(veic):"—")+'</span>',"expedição")
       +kpi("var(--amber)","Linhas de carga",fmtInt(nLinhas),"paredões + arremates")
       +kpi("var(--green)","Peso total",peso?esc(peso)+" kg":"—","carga estimada");

  var meta='<div class="rm-head">'
    +'<div class="rm-meta"><div class="l">Evento</div><div class="v">'+(evento?esc(evento):"—")+'</div></div>'
    +'<div class="rm-meta"><div class="l">Veículo</div><div class="v" style="font-size:18px">'+(veic?esc(veic):"—")+'</div></div>'
    +'</div>';

  var listHtml="";
  for(var k=0;k<lines.length;k++){
    var ln=lines[k];
    if(ln.truck){ listHtml+='<div class="truckbar">— '+esc(ln.truck.replace(/---/g,"").trim())+' —</div>'; continue; }
    if(!ln.cols) continue;
    if(!matchFilter([ln.rawText])) continue;
    var cols="";
    for(var c=0;c<ln.cols.length;c++){
      cols+='<div class="rm-col"><span class="cn">'+esc(ln.cols[c].addr)+'</span><span class="cq">'+ln.cols[c].descHtml+'</span></div>';
    }
    var tags="";
    if(ln.degrau) tags+='<span class="tag t-b" style="margin-left:8px">DEGRAU</span>';
    if(ln.arremate) tags+='<span class="tag t-a" style="margin-left:6px">⚠ ARREMATE</span>';
    listHtml+='<div class="rm-line">'
      +'<div class="rm-idx"><span class="n">L'+ln.num+'</span>'+tags+'</div>'
      +'<div class="rm-cols">'+cols+'</div>'
      +'<div class="rm-metrics">'
        +'<div class="m"><div class="mv">'+esc(ln.prof)+'</div><div class="ml">Prof.</div></div>'
        +'<div class="m"><div class="mv">'+esc(ln.sL)+'</div><div class="ml">Sobra L</div></div>'
        +'<div class="m"><div class="mv">'+esc(ln.sA)+'</div><div class="ml">Sobra A</div></div>'
      +'</div>'
      +'</div>';
  }
  var summary='<div class="rm-summary"><div class="big">Peso total: '+(peso?esc(peso)+" kg":"—")+'</div>'
    +'<div class="mono" style="font-size:14px">Sobra de lastro: <b style="color:var(--blue)">'+(sobra?esc(sobra):"—")+'</b></div></div>';

  return '<div class="kpis">'+h+'</div>'+meta+'<div class="card">'+(listHtml||'<div class="state muted">Sem linhas.</div>')+'</div>'+summary;
}

function parseRomaneioLine(text, prof, sL, sA){
  var out={rawText:text, prof:prof||"—", sL:sL||"—", sA:sA||"—", cols:[], degrau:false, arremate:false, num:""};
  out.degrau = /\[DEGRAU\]/i.test(text);
  out.arremate = /ARREMATE/i.test(text);
  var mnum=text.match(/LINHA\s*(\d+)/i); out.num=mnum?mnum[1]:"";
  var body=text.replace(/^LINHA\s*\d+\s*(\[DEGRAU\])?\s*:/i,"");
  body=body.replace(/\[⚠️?\s*ARREMATE\]/gi,"").replace(/\[ARREMATE\]/gi,"");
  var parts=body.split("+");
  for(var i=0;i<parts.length;i++){
    var seg=parts[i].trim(); if(!seg)continue;
    var am=seg.match(/\[COL\s*(\d+)\]/i);
    var addr=am?("COL "+am[1]):("COL "+(i+1));
    var desc=seg.replace(/\[COL\s*\d+\]/i,"").trim();
    desc=esc(desc).replace(/(\d+x)/g,'<b style="font-family:JetBrains Mono;color:var(--yellow)">$1</b>');
    out.cols.push({addr:addr, descHtml:desc});
  }
  return out;
}

/* ================= OVERVIEW: data aggregators ================= */
function shortLbl(s,n){ s=String(s||""); n=n||16; return s.length>n?s.slice(0,n-1)+"…":s; }

function aggMultasMes(){
  var rows=(cache.multa&&cache.multa.rows)||[], map={};
  for(var i=0;i<rows.length;i++){ var d=parseDate(g(rows[i],"DATA")); if(!d)continue;
    var v=toNumber(g(rows[i],"VALOR")); if(isNaN(v))v=0;
    var key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    if(!map[key])map[key]={v:0,label:MON[d.getMonth()]+"/"+String(d.getFullYear()).slice(2)};
    map[key].v+=v; }
  var keys=Object.keys(map).sort();
  return {labels:keys.map(function(k){return map[k].label;}), data:keys.map(function(k){return +map[k].v.toFixed(2);})};
}
function aggMultasVeiculo(){
  var rows=(cache.multa&&cache.multa.rows)||[], map={};
  for(var i=0;i<rows.length;i++){ var vc=g(rows[i],"VEÍCULO"); if(!vc)continue; var v=toNumber(g(rows[i],"VALOR")); if(isNaN(v))v=0; map[vc]=(map[vc]||0)+v; }
  var arr=Object.keys(map).map(function(k){return {k:k,v:map[k]};}).sort(function(a,b){return b.v-a.v;}).slice(0,8);
  return {labels:arr.map(function(x){return x.k;}), data:arr.map(function(x){return +x.v.toFixed(2);})};
}
function aggPontosMotorista(){
  var rows=(cache.multa&&cache.multa.rows)||[], mapP={}, mapC={};
  for(var i=0;i<rows.length;i++){ var mo=g(rows[i],"MOTORISTA"); if(!mo)continue;
    var p=toNumber(g(rows[i],"PONTOS")); if(isNaN(p))p=0; mapP[mo]=(mapP[mo]||0)+p; mapC[mo]=(mapC[mo]||0)+1; }
  var totalP=0; for(var k in mapP)totalP+=mapP[k];
  var useMap=totalP>0?mapP:mapC;
  var arr=Object.keys(useMap).map(function(k){return {k:k,v:useMap[k]};}).sort(function(a,b){return b.v-a.v;}).slice(0,8);
  return {labels:arr.map(function(x){return shortLbl(x.k,14);}), data:arr.map(function(x){return x.v;}), isPoints:totalP>0};
}
function aggTrocasKm(){
  var rows=(cache.troca&&cache.troca.rows)||[], arr=[];
  for(var i=0;i<rows.length;i++){ var f=toNumber(g(rows[i],"KM FALTANTE")); if(isNaN(f))continue;
    arr.push({lbl:g(rows[i],"PLACA")+" · "+shortLbl(g(rows[i],"ITEM CONTROLE"),14), v:f, cls:trocaStatus(rows[i]).cls}); }
  arr.sort(function(a,b){return a.v-b.v;}); arr=arr.slice(0,12);
  var col={r:"#e11d2a",a:"#f5a623",g:"#25c281",n:"#727a86"};
  return {labels:arr.map(function(x){return x.lbl;}), data:arr.map(function(x){return x.v;}), colors:arr.map(function(x){return col[x.cls]||col.g;})};
}
function aggCapacidadeVeiculo(){
  var raw=cache.capacidade&&cache.capacidade.raw; if(!raw)return {labels:[],data:[]};
  var m=mapByHeader(raw,["PAINEL"]); var hdr=m.headers, rows=m.rows;
  var cols=[]; for(var i=1;i<hdr.length;i++){ if(String(hdr[i]).trim())cols.push(hdr[i]); }
  var arr=[];
  for(var c=0;c<cols.length;c++){ var sum=0,n=0;
    for(var r=0;r<rows.length;r++){ var v=toNumber(rows[r][norm(cols[c])]); if(!isNaN(v)){sum+=v;n++;} }
    if(n)arr.push({k:cols[c], v:Math.round(sum/n)}); }
  arr.sort(function(a,b){return a.v-b.v;});
  return {labels:arr.map(function(x){return shortLbl(x.k,16);}), data:arr.map(function(x){return x.v;})};
}
function aggVencimentos(){
  var faixas=["Vencido","≤30d","31-60d","61-90d",">90d"];
  var cnh=[0,0,0,0,0], tac=[0,0,0,0,0];
  function bucket(days){ if(days<0)return 0; if(days<=30)return 1; if(days<=60)return 2; if(days<=90)return 3; return 4; }
  var mot=(cache.motorista&&cache.motorista.rows)||[];
  for(var i=0;i<mot.length;i++){ var d=daysUntil(parseDate(g(mot[i],"VALIDADE"))); if(d!=null)cnh[bucket(d)]++; }
  var vei=(cache.veiculo&&cache.veiculo.rows)||[];
  for(var j=0;j<vei.length;j++){ var dv=daysUntil(parseDate(g(vei[j],"VENC. TACÓGRAFO"))); if(dv!=null)tac[bucket(dv)]++; }
  return {labels:faixas, cnh:cnh, tac:tac};
}

function alertData(){

    trocas.push({p:g(tro[i],"ITEM CONTROLE"), s:"Placa "+g(tro[i],"PLACA")+" · próx. "+cleanNum(g(tro[i],"PRÓXIMA TROCA"))+" km",
      mv:(isNaN(f)?"—":fmtInt(f)+" km"), cls:s.cls, sort:isNaN(f)?9e9:f}); } }
  trocas.sort(function(a,b){return a.sort-b.sort;});
  var mot=(cache.motorista&&cache.motorista.rows)||[];
  for(var j=0;j<mot.length;j++){ var vd=parseDate(g(mot[j],"VALIDADE")); var dd=daysUntil(vd);

      mv:(dd<0?(-dd)+"d venc.":dd+"d"), cls:(dd<0?"r":"a"), sort:dd}); } }
  cnh.sort(function(a,b){return a.sort-b.sort;});
  var vei=(cache.veiculo&&cache.veiculo.rows)||[];
  for(var k=0;k<vei.length;k++){ var td=parseDate(g(vei[k],"VENC. TACÓGRAFO")); var dt=daysUntil(td);
    if(dt!=null&&dt<=60){ taco.push({p:g(vei[k],"PLACA")+" · "+shortLbl(g(vei[k],"VEÍCULO"),20), s:"Tacógrafo vence "+fmtDate(td),
      mv:(dt<0?(-dt)+"d venc.":dt+"d"), cls:(dt<0?"r":"a"), sort:dt}); } }
  taco.sort(function(a,b){return a.sort-b.sort;});

  for(var m=0;m<mul.length;m++){ if(norm(g(mul[m],"À COBRAR"))==="SIM"){ var v=g(mul[m],"VALOR");
    multas.push({p:g(mul[m],"INFRAÇÃO"), s:"Placa "+g(mul[m],"VEÍCULO")+(g(mul[m],"MOTORISTA")?" · "+g(mul[m],"MOTORISTA"):""),
      mv:(v?"R$ "+v:"—"), cls:"r", sort:0}); } }
  return {trocas:trocas, cnh:cnh, taco:taco, multas:multas, col:col};
}
function awin(icon,title,items,col){
  var crit=false,warn=false; for(var i=0;i<items.length;i++){ if(items[i].cls==="r")crit=true; else if(items[i].cls==="a")warn=true; }
  var klass=items.length?(crit?"crit":(warn?"warn":"okk")):"okk";
  var h='<div class="awin '+klass+'"><div class="ah"><span class="ic">'+icon+'</span><span class="ttl">'+esc(title)+'</span>'
    +'<span class="badge">'+items.length+'</span></div>';
  if(!items.length){ h+='<div class="allok"><span>✓</span>Tudo em dia</div></div>'; return h; }
  h+='<div class="alist">';
  for(var j=0;j<items.length;j++){ var it=items[j];
    h+='<div class="arow"><div class="main"><div class="p">'+esc(it.p||"—")+'</div><div class="s">'+esc(it.s||"")+'</div></div>'
      +'<div class="r"><span class="mv" style="color:'+col[it.cls]+'">'+esc(it.mv)+'</span></div></div>'; }
  h+='</div></div>'; return h;
}

function currentViewMeta(){
  var mod=MODULES.filter(function(m){return m.id===state.mod;})[0];
  var v=mod.views.filter(function(x){return x.id===state.view;})[0];
  return {mod:mod, view:v};
}

function renderView(){
  var meta=currentViewMeta();
  var area=$("viewArea");
  var isOverview=(state.view==="overview");
  if(!isOverview) destroyCharts();
  var searchable = !isOverview && (["resultado"].indexOf(state.view)===-1);
  area.innerHTML=''
    +'<div class="vhead"><h1>'+meta.view.ic+' '+esc(meta.view.label)+'</h1>'
    +'<span class="sub">'+esc(meta.mod.label)+'</span>'
    +'<div class="tools">'
    +(searchable?'<div class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg><input id="searchInput" placeholder="Filtrar…" value="'+esc(state.filter)+'"></div>':'')
    +'</div></div>'
    +'<div class="spectrum vhline"></div>'
    +'<div id="viewBody">'+loadingState()+'</div>';

  if(searchable){
    var si=$("searchInput");
    si.oninput=function(){ state.filter=si.value; paintBody(); };
  }

  if(isOverview){
    var need=["motorista","veiculo","troca","multa","capacidade"];
    var miss=need.filter(function(id){ return !(cache[id]&&cache[id].raw); });
    if(!miss.length){ paintOverview(); return; }
    Promise.all(miss.map(function(id){ return fetchView(id).catch(function(){ return null; }); }))
      .then(function(){ if(state.view==="overview"){ paintOverview(); computeAlerts(); buildSubNav(); } });
    return;
  }

  var id=state.view;
  if(cache[id] && cache[id].raw){ paintBody(); }
  else{
    fetchView(id).then(function(){ paintBody(); refreshAlertsIfReady(); }).catch(function(e){ $("viewBody").innerHTML=errorState(e.message); });
  }
}
function paintOverview(){
  var body=$("viewBody"); if(!body)return;
  try{ body.innerHTML=renderOverview(); buildOverviewCharts(); }
  catch(e){ body.innerHTML=errorState(e.message); }
}
function repaintCurrent(){ if(state.view==="overview")paintOverview(); else paintBody(); }
function paintBody(){
  var id=state.view, body=$("viewBody"); if(!body)return;
  try{
    var d=cache[id];
    if(!d||!d.raw){ body.innerHTML=loadingState(); return; }
    body.innerHTML=RENDERERS[id](d);
    var c=counts[id]; if(c!=null){ var st=document.querySelector('.subtab[data-v="'+id+'"] .cnt'); if(st)st.textContent=c; }
  }catch(e){ body.innerHTML=errorState(e.message); }
}

  var jobs=ids.map(function(id){ return fetchView(id).catch(function(){ return null; }); });
  Promise.all(jobs).then(function(){
    stamp(); computeAlerts(); buildSubNav();
    repaintCurrent();
    btn.disabled=false; btn.style.opacity="1";
  });
}
function refreshAlertsIfReady(){
  if(cache.motorista&&cache.veiculo&&cache.troca&&cache.multa) computeAlerts();
}

/* ================= INIT ================= */
function init(){
  $("logo").src=window.__LOGO__;
  buildModTabs(); buildSubNav(); renderView();
  $("refreshBtn").onclick=refreshAll;
  /* warm the alert data in background */
  ["motorista","veiculo","troca","multa"].forEach(function(id){
    if(!cache[id]) fetchView(id).then(function(){ refreshAlertsIfReady(); buildSubNav(); if(state.view===id)paintBody(); }).catch(function(){});
  });
  stamp();
  timer=setInterval(refreshAll, 5*60*1000);
}
document.addEventListener("DOMContentLoaded",init);
